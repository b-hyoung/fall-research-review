<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>낙상 연구 포지셔닝 분석</title>
    <style>
        :root {
            --bg: #f6f7fa;
            --surface: #ffffff;
            --surface-hover: #f9fafb;
            --border: #e4e7ed;
            --border-light: #eef0f4;
            --text-1: #16181d;
            --text-2: #4e5562;
            --text-3: #8a8f9d;
            --accent: #3563e9;
            --accent-soft: #edf1fd;
            --accent-dark: #2549b8;
            --orange: #d97706;
            --orange-soft: #fef9ee;
            --blue: #2572cc;
            --blue-soft: #eef5fc;
            --green: #15803d;
            --green-soft: #eef7f1;
            --rose: #be123c;
            --rose-soft: #fdf1f4;
            --purple: #7c3aed;
            --purple-soft: #f3efff;
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --sh-sm: 0 1px 2px rgba(22,24,29,0.04);
            --sh-md: 0 4px 12px rgba(22,24,29,0.06);
            --sh-lg: 0 8px 28px rgba(22,24,29,0.08);
            --ease: cubic-bezier(0.25,0.1,0.25,1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased}

        /* ===== Sticky Header ===== */
        .top-bar{position:sticky;top:0;z-index:100;background:rgba(246,247,250,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px}
        .top-inner{max-width:1320px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:16px}
        .top-title{font-size:15px;font-weight:800;color:var(--text-1);letter-spacing:-0.01em;white-space:nowrap}
        .mode-tabs{display:flex;gap:2px;background:var(--border-light);border-radius:var(--r-sm);padding:3px}
        .mode-tab{padding:7px 18px;border:none;border-radius:6px;background:transparent;font-size:13px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all 180ms var(--ease);font-family:inherit;white-space:nowrap}
        .mode-tab:hover{color:var(--text-2)}
        .mode-tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--sh-sm)}
        .filter-pills{display:flex;gap:6px;align-items:center}
        .filter-pills span{font-size:12px;color:var(--text-3);font-weight:600;margin-right:2px}
        .pill{padding:5px 14px;border:1px solid var(--border);border-radius:100px;background:var(--surface);font-size:12px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all 180ms var(--ease);font-family:inherit}
        .pill:hover{border-color:var(--accent);color:var(--accent)}
        .pill.on{border-color:var(--accent);background:var(--accent);color:#fff}

        .container{max-width:1320px;margin:0 auto;padding:32px 32px 80px}

        /* ===== Stats ===== */
        .stats{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap}
        .st{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 20px;text-align:center;transition:transform 180ms var(--ease)}
        .st:hover{transform:translateY(-1px)}
        .st-n{font-size:26px;font-weight:800;letter-spacing:-0.02em}
        .st-l{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}

        /* ===== Modes ===== */
        .mode{display:none}.mode.on{display:block}

        /* ===== Tags ===== */
        .tag{display:inline-flex;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
        .t-detect{background:var(--blue-soft);color:var(--blue)}
        .t-predict{background:var(--orange-soft);color:var(--orange)}

        /* ===== CARD VIEW ===== */
        .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:box-shadow 200ms var(--ease),transform 200ms var(--ease)}
        .card:hover{box-shadow:var(--sh-lg);transform:translateY(-2px)}
        .c-hd{padding:20px 24px 16px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
        .c-hd h3{font-size:15px;font-weight:800;letter-spacing:-0.01em;margin-bottom:3px}
        .c-hd .sub{font-size:11px;color:var(--text-3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .c-sec{padding:14px 24px;border-bottom:1px solid var(--border-light)}
        .c-sec:last-child{border-bottom:none}
        .c-sec-t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .dot{width:6px;height:6px;border-radius:50%}
        .d-o{background:var(--orange)}.d-b{background:var(--blue)}.d-g{background:var(--green)}.d-r{background:var(--rose)}
        .s-o .c-sec-t{color:var(--orange)}.s-b .c-sec-t{color:var(--blue)}.s-g .c-sec-t{color:var(--green)}.s-r .c-sec-t{color:var(--rose)}
        .c-row{display:flex;margin-bottom:6px;font-size:13px;line-height:1.55}
        .c-row:last-child{margin-bottom:0}
        .c-lbl{flex-shrink:0;width:68px;color:var(--text-3);font-weight:600;font-size:12px}
        .c-val{flex:1;color:var(--text-2)}

        /* ===== PRESENTATION MODE ===== */
        .pres-section{margin-bottom:64px}
        .pres-section:last-child{margin-bottom:0}
        .pres-h{font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px}
        .pres-sub{color:var(--text-3);font-size:14px;margin-bottom:32px;line-height:1.6}
        .pres-step{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}

        /* Positioning Map */
        .map-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px;position:relative;aspect-ratio:16/10;max-height:560px;overflow:visible}
        .map-axes{position:absolute;inset:60px 80px}
        .axis-x,.axis-y{position:absolute;background:var(--border)}
        .axis-x{left:0;right:0;top:50%;height:1px}
        .axis-y{top:0;bottom:0;left:50%;width:1px}
        .axis-label{position:absolute;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em}
        .ax-l{left:0;top:50%;transform:translateY(8px)}
        .ax-r{right:0;top:50%;transform:translateY(8px)}
        .ax-t{left:50%;top:0;transform:translateX(-50%) translateY(-20px)}
        .ax-b{left:50%;bottom:0;transform:translateX(-50%) translateY(20px)}
        .quad-label{position:absolute;font-size:10px;font-weight:700;color:var(--text-3);opacity:0.5;letter-spacing:0.03em}
        .q-tl{top:8px;left:8px}.q-tr{top:8px;right:8px}.q-bl{bottom:8px;left:8px}.q-br{bottom:8px;right:8px}

        .dot-paper{position:absolute;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;cursor:pointer;transition:transform 200ms var(--ease),box-shadow 200ms var(--ease);z-index:2}
        .dot-paper:hover{transform:scale(1.3);z-index:10;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
        .dot-paper.ours{width:52px;height:52px;font-size:11px;border:3px solid #fff;box-shadow:0 0 0 3px var(--accent),0 4px 20px rgba(53,99,233,0.35);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 3px var(--accent),0 4px 20px rgba(53,99,233,0.35)}50%{box-shadow:0 0 0 6px rgba(53,99,233,0.3),0 4px 24px rgba(53,99,233,0.4)}}

        .tooltip{position:absolute;background:var(--text-1);color:#fff;padding:10px 14px;border-radius:var(--r-sm);font-size:12px;line-height:1.5;max-width:240px;pointer-events:none;opacity:0;transition:opacity 150ms var(--ease);z-index:20;box-shadow:var(--sh-lg)}
        .tooltip.show{opacity:1}
        .tooltip .tt-name{font-weight:700;margin-bottom:2px}
        .tooltip .tt-detail{color:rgba(255,255,255,0.7);font-size:11px}

        /* Gap Analysis */
        .gaps{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
        .gap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;transition:box-shadow 200ms var(--ease),transform 200ms var(--ease)}
        .gap-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
        .gap-icon{width:40px;height:40px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
        .gap-title{font-size:15px;font-weight:800;margin-bottom:6px;letter-spacing:-0.01em}
        .gap-problem{font-size:13px;color:var(--text-3);margin-bottom:12px;line-height:1.5}
        .gap-solve{font-size:13px;color:var(--green);font-weight:600;line-height:1.5;padding:10px 14px;background:var(--green-soft);border-radius:var(--r-sm)}
        .gap-papers{margin-top:12px;display:flex;flex-wrap:wrap;gap:4px}
        .gap-papers .gp{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--border-light);color:var(--text-3);font-weight:600}

        /* Our Research Card */
        .our-card{background:linear-gradient(135deg,#3563e9,#7c3aed);border-radius:var(--r-lg);padding:40px;color:#fff;margin-top:24px}
        .our-card h3{font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-0.02em}
        .our-card p{font-size:14px;opacity:0.85;margin-bottom:24px;line-height:1.6}
        .our-features{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
        .our-feat{background:rgba(255,255,255,0.15);border-radius:var(--r-sm);padding:16px;backdrop-filter:blur(8px)}
        .our-feat dt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;opacity:0.7;margin-bottom:4px}
        .our-feat dd{font-size:14px;font-weight:700}

        /* ===== DASHBOARD MODE ===== */
        .dash{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .dash-full{grid-column:1/-1}
        .dash-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px}
        .dash-panel-title{font-size:13px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:16px}

        .mini-gap{display:flex;flex-direction:column;gap:10px}
        .mini-gap-row{display:flex;align-items:center;gap:10px;font-size:13px}
        .mini-gap-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .mini-gap-text{flex:1}
        .mini-gap-label{font-weight:700;color:var(--text-1)}
        .mini-gap-desc{font-size:11px;color:var(--text-3)}
        .mini-gap-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--green-soft);color:var(--green);white-space:nowrap}

        .mini-papers{display:flex;flex-direction:column;gap:6px}
        .mini-paper{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);transition:background 150ms var(--ease)}
        .mini-paper:hover{background:var(--surface-hover)}
        .mini-paper-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .mini-paper-name{font-size:12px;font-weight:700;flex:1}
        .mini-paper-tag{font-size:10px}

        /* ===== Footer ===== */
        .foot{text-align:center;color:var(--text-3);font-size:12px;margin-top:48px;padding-top:24px;border-top:1px solid var(--border)}
        .foot code{background:var(--surface-hover);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--accent);font-weight:600}

        /* ===== Responsive ===== */
        @media(max-width:1200px){
            .cards{grid-template-columns:repeat(3,1fr)}
        }
        @media(max-width:900px){
            .top-inner{flex-wrap:wrap;height:auto;padding:12px 0;gap:8px}
            .cards{grid-template-columns:repeat(2,1fr)}
            .dash{grid-template-columns:1fr}
            .container{padding:24px 16px 60px}
            .top-bar{padding:0 16px}
            .our-features{grid-template-columns:1fr 1fr}
            .map-wrap{aspect-ratio:4/3}
        }
        @media(max-width:580px){
            .cards{grid-template-columns:1fr}
            .mode-tab{padding:6px 12px;font-size:12px}
            .filter-pills{flex-wrap:wrap}
            .stats{gap:8px}.st{min-width:calc(50% - 4px);padding:14px}
            .our-features{grid-template-columns:1fr}
        }
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:0.01ms!important;animation:none!important}}
    </style>
</head>
<body>

<!-- Sticky Header -->
<nav class="top-bar">
    <div class="top-inner">
        <div class="top-title">낙상 연구 분석</div>
        <div class="mode-tabs" id="modeTabs">
            <button class="mode-tab active" data-mode="cards" type="button">카드 뷰</button>
            <a href="presentation.html" class="mode-tab" style="text-decoration:none">발표 모드 →</a>
        </div>
        <div class="filter-pills" id="filters">
            <span>분류</span>
            <button class="pill on" data-f="비교논문" type="button">비교 논문</button>
            <button class="pill" data-f="기술근거" type="button">기술 근거</button>
            <button class="pill" data-f="all" type="button">전체</button>
            <span style="margin-left:12px">목적</span>
            <button class="pill" data-f="예측" type="button">예측</button>
            <button class="pill" data-f="탐지" type="button">탐지</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="stats" id="stats"></div>

    <!-- ===== CARD VIEW ===== -->
    <div class="mode on" id="m-cards">
        <div class="cards" id="cardGrid"></div>
    </div>

    <p class="foot">데이터 소스: <code>papers.json</code> — 논문 추가/수정 시 JSON 파일만 편집하면 자동 반영</p>
</div>

<script>
const TAG_CLS = {'탐지':'t-detect','예측':'t-predict'};
let allPapers = [];

function renderStats(pp) {
    const d = pp.filter(p=>p.purpose==='탐지').length;
    const pr = pp.filter(p=>p.purpose==='예측').length;
    const s = new Set(pp.map(p=>p.sensor.split(/[,+]/)[0].trim())).size;
    document.getElementById('stats').innerHTML = `
        <div class="st"><div class="st-n" style="color:var(--accent)">${pp.length}</div><div class="st-l">총 논문</div></div>
        <div class="st"><div class="st-n" style="color:var(--orange)">${pr}</div><div class="st-l">예측</div></div>
        <div class="st"><div class="st-n" style="color:var(--green)">${d}</div><div class="st-l">탐지</div></div>
        <div class="st"><div class="st-n" style="color:var(--purple)">${s}</div><div class="st-l">센서 유형</div></div>`;
}

function renderCards(pp) {
    document.getElementById('cardGrid').innerHTML = pp.map(p=>`
        <div class="card">
            <div class="c-hd"><div><h3>${p.name}</h3><div class="sub">${p.title}</div></div><span class="tag ${TAG_CLS[p.purpose]||'t-predict'}">${p.purpose}</span></div>
            <div class="c-sec s-o"><div class="c-sec-t"><span class="dot d-o"></span> 연구 배경</div><div class="c-row"><span class="c-val">${p.background}</span></div></div>
            <div class="c-sec s-b"><div class="c-sec-t"><span class="dot d-b"></span> 연구 대상 · 환경</div><div class="c-row"><span class="c-lbl">대상</span><span class="c-val">${p.subject}</span></div><div class="c-row"><span class="c-lbl">환경</span><span class="c-val">${p.environment}</span></div></div>
            <div class="c-sec s-g"><div class="c-sec-t"><span class="dot d-g"></span> 연구 방법 · 성능</div><div class="c-row"><span class="c-lbl">센서</span><span class="c-val">${p.sensor}</span></div><div class="c-row"><span class="c-lbl">알고리즘</span><span class="c-val">${p.algorithm}</span></div><div class="c-row"><span class="c-lbl">데이터</span><span class="c-val">${p.data}</span></div><div class="c-row"><span class="c-lbl">성능</span><span class="c-val">${p.performance}</span></div><div class="c-row"><span class="c-lbl">한계점</span><span class="c-val">${p.limitations}</span></div></div>
            <div class="c-sec s-r"><div class="c-sec-t"><span class="dot d-r"></span> 우리와의 차이</div><div class="c-row"><span class="c-val">${p.difference}</span></div></div>
            ${p.category==='기술근거' ? `<div class="c-sec" style="background:#edf1fd;border-radius:0 0 16px 16px"><div class="c-sec-t" style="color:#3563e9"><span class="dot" style="background:#3563e9"></span> 심층 분석</div>
                <div class="c-row"><span class="c-lbl">학술 강점</span><span class="c-val">${p.strengths_academic||''}</span></div>
                <div class="c-row"><span class="c-lbl">학술 약점</span><span class="c-val">${p.weaknesses_academic||''}</span></div>
                <div class="c-row"><span class="c-lbl">참고할 점</span><span class="c-val">${p.reference_for_us||''}</span></div>
                <div class="c-row"><span class="c-lbl">넘어설 점</span><span class="c-val" style="color:#15803d;font-weight:600">${p.we_overcome||''}</span></div>
            </div>` : ''}
        </div>`).join('');
}

// Filter
document.getElementById('filters').addEventListener('click', e=>{
    const pill = e.target.closest('.pill');
    if(!pill) return;
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
    pill.classList.add('on');
    const f = pill.dataset.f;
    let filtered;
    if(f==='all') filtered = allPapers;
    else if(f==='비교논문') filtered = allPapers.filter(p=>!p.category);
    else if(f==='기술근거') filtered = allPapers.filter(p=>p.category==='기술근거');
    else filtered = allPapers.filter(p=>p.purpose===f);
    renderCards(filtered);
});

// Load
fetch('./papers.json')
    .then(r=>r.json())
    .then(pp=>{
        allPapers = pp;
        const comparePapers = pp.filter(p=>!p.category);
        renderStats(comparePapers);
        renderCards(comparePapers);
    })
    .catch(()=>{
        document.getElementById('cardGrid').innerHTML = '<p style="text-align:center;color:var(--text-3);padding:48px;grid-column:1/-1">papers.json을 불러올 수 없습니다.</p>';
    });
</script>

</body>
</html>
<!-- END OF FILE - 발표 모드는 presentation.html 참조 -->
